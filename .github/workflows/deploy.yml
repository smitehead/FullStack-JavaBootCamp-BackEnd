name: CI/CD Pipeline # 액션의 이름 ff

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드 push가 발생하면 감지해서 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 깃허브가 제공하는 가상 컴퓨터에서 빌드 시작

    steps:
    # (1) 깃허브에 올린 최신 코드를 가져옵니다.
    - name: Checkout code
      uses: actions/checkout@v3

    # (2) 스프링 부트 빌드를 위해 자바 환경을 세팅합니다.
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # (3) 코드를 빌드해서 .jar 파일을 만듭니다. (자동 빌드 구간)
    - name: Build with Maven
      run: |
        ./mvnw clean package -DskipTests

    # (4) 빌드된 결과물(.jar)을 내 EC2 서버로 안전하게 보냅니다.
    - name: Deliver build file to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/*.jar"
        target: "/home/ubuntu/app" # 파일이 저장될 EC2 경로
        strip_components: 2

    # (5) EC2에 접속해서 기존 서버를 끄고 새 서버를 켭니다. (자동 재실행 구간)
    - name: Restart Server on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/app
          # 기존에 8080 포트에서 돌아가던 스프링 부트 종료
          fuser -k 8080/tcp || true 
          # 새로 온 파일로 백그라운드 실행
          nohup java -jar *.jar > app.log 2>&1 &