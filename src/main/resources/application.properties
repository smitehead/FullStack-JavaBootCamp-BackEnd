spring.application.name=project

# Oracle DB 연결
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@teacherdev09.kro.kr:8877:XE
spring.datasource.username=JAVAJAVA
spring.datasource.password=JAVAjava##0909

# JPA / Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Oracle 전용 SQL 문법을 사용하도록 방언 명시 (미설정 시 FETCH FIRST 문법 오류 발생)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# JWT 설정
# secret: HS256 기준 최소 32자 이상 필요
jwt.secret=javajava-fullstack-bootcamp-secret-key-2024
# expiration: 토큰 만료 시간 (밀리초) - 24시간
jwt.expiration=86400000

# 스프링 부트 3.x (Hibernate 6) 용 Oracle 11g 완벽 호환 설정
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.dialect.version=11.2.0
