spring.application.name=project

# Oracle DB 연결
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Oracle 11g 호환 커스텀 Dialect (ROWNUM 기반 페이징)
spring.jpa.database-platform=org.hibernate.community.dialect.OracleLegacyDialect
# SSE 통신 시 DB 커넥션 고갈(HikariCP Deadlock) 방지
spring.jpa.open-in-view=false

# SSE 클라이언트 정상 연결 해제 시 발생하는 IOException 로그 레벨 조정
# (페이지 이동, 탭 닫기 등으로 인한 WSAECONNABORTED는 정상 동작)
logging.level.org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter=WARN

# JWT 설정
# secret: HS256 기준 최소 32자 이상 필요
jwt.secret=${JWT_SECRET}
# expiration: 토큰 만료 시간 (밀리초) - 3시간
jwt.expiration=10800000

# Gmail SMTP 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 이미지 업로드 설정
# file.dir: 이미지가 저장될 경로
#   - 상대 경로(예: uploads/) → FileStore가 user.dir 기준 절대 경로로 자동 변환
#   - 절대 경로 예시(Windows): file.dir=C:/fullstack/uploads/
#   - 절대 경로 예시(Linux):   file.dir=/var/www/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
file.dir=uploads/

#portone v1 설정
portone.api-key=${PORTONE_API_KEY}
portone.api-secret=${PORTONE_API_SECRET}
portone.base-url=https://api.iamport.kr
portone.channel-key=${PORTONE_CHANNEL_KEY}